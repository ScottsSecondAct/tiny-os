name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Format & lint
  # ---------------------------------------------------------------------------
  check:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Install Rust toolchain
        run: rustup show   # rust-toolchain.toml drives the install

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy (Pi 5 BSP)
        run: cargo clippy --release -- -D warnings

      - name: Clippy (QEMU BSP)
        run: cargo clippy --release --no-default-features --features kernel/bsp-qemu -- -D warnings

  # ---------------------------------------------------------------------------
  # Build — Raspberry Pi 5 (default BSP)
  # ---------------------------------------------------------------------------
  build-rpi5:
    name: Build (Pi 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Install Rust toolchain
        run: rustup show

      - name: Build
        run: cargo build --release

      - name: Verify _start at 0x80000
        run: |
          aarch64-linux-gnu-nm target/aarch64-unknown-none/release/kernel | grep _start
          aarch64-linux-gnu-nm target/aarch64-unknown-none/release/kernel | grep _start | grep -q "0000000000080000"

      - name: Produce kernel8.img
        run: |
          cargo install cargo-binutils 2>/dev/null || true
          cargo objcopy --release -- -O binary kernel8.img
          ls -lh kernel8.img

      - name: Upload kernel8.img
        uses: actions/upload-artifact@v4
        with:
          name: kernel8-rpi5
          path: kernel8.img

  # ---------------------------------------------------------------------------
  # Build — QEMU (raspi3b BSP)
  # ---------------------------------------------------------------------------
  build-qemu:
    name: Build (QEMU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Install Rust toolchain
        run: rustup show

      - name: Build
        run: cargo build --release --no-default-features --features kernel/bsp-qemu

  # ---------------------------------------------------------------------------
  # Boot test — run in QEMU and verify serial output
  # ---------------------------------------------------------------------------
  qemu-boot:
    name: QEMU Boot Test
    runs-on: ubuntu-latest
    needs: build-qemu
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-system-aarch64

      - name: Install Rust toolchain
        run: rustup show

      - name: Build (QEMU BSP)
        run: cargo build --release --no-default-features --features kernel/bsp-qemu

      - name: Run QEMU and verify boot banner
        run: |
          timeout 15 qemu-system-aarch64 \
            -M raspi3b \
            -kernel target/aarch64-unknown-none/release/kernel \
            -serial stdio \
            -display none \
            -no-reboot \
          | tee /tmp/qemu-output.txt || true
          grep -q "tiny_os Phase 1 boot" /tmp/qemu-output.txt
          echo "Boot test passed."
